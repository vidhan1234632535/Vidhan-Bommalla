<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="100%" height="100%">
  <!-- Definition for font styling -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Alex+Brush&amp;display=swap');
      .sans-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      .signature-text {
        font-family: 'Alex Brush', 'Brush Script MT', 'Apple Chancery', 'Lucida Handwriting', cursive;
      }
    </style>
  </defs>

  <!-- Certificate background -->
  <rect width="1000" height="750" fill="#ffffff" />

  <!-- Outer frame (double line style exactly like authentic certificate) -->
  <!-- Outer thick black border line -->
  <rect x="25" y="25" width="950" height="700" fill="none" stroke="#111111" stroke-width="2" />
  <!-- Inner very thin line -->
  <rect x="33" y="33" width="934" height="684" fill="none" stroke="#111111" stroke-width="0.75" />

  <!-- Blackmagic Design Logo Block (Perfect centering and alignment) -->
  <g transform="translate(350, 125)">
    <text x="0" y="44" class="sans-text" font-size="34" font-weight="500" fill="#111111" letter-spacing="-1.2">Blackmagic</text>
    <text x="175" y="44" class="sans-text" font-size="34" font-weight="300" fill="#777777" letter-spacing="-1.2">design</text>
    <!-- Logo blocks on the right (vertical rounded rectangles as pills) -->
    <g transform="translate(285, 0)">
      <rect x="0" y="2" width="14" height="20" rx="3.5" fill="#df6f2b" />
      <rect x="0" y="26" width="14" height="20" rx="3.5" fill="#e88b30" />
      <rect x="0" y="50" width="14" height="20" rx="3.5" fill="#933423" />
    </g>
  </g>

  <!-- Body Text Section -->
  <text x="500" y="275" text-anchor="middle" class="sans-text" font-size="18" fill="#111111" font-weight="400" letter-spacing="1">acknowledges</text>

  <!-- Student Name -->
  <text x="500" y="345" text-anchor="middle" class="sans-text" font-size="36" font-weight="400" fill="#000000">Vidhan Bommalla</text>

  <!-- Certificate Middle Label -->
  <text x="500" y="405" text-anchor="middle" class="sans-text" font-size="18" fill="#111111" font-weight="400">as a Certified User for</text>

  <!-- Certificate Core Subject -->
  <text x="500" y="475" text-anchor="middle" class="sans-text" font-size="28" font-weight="500" fill="#000000" letter-spacing="0.2">The Colorist's Guide to DaVinci Resolve 20</text>

  <!-- Date Issued -->
  <text x="500" y="545" text-anchor="middle" class="sans-text" font-size="18" fill="#111111" font-weight="400">March 24, 2026</text>

  <!-- Footer signature and metadata area -->
  <g transform="translate(180, 615)">
    <!-- Certificate validation code left side -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" class="sans-text" font-size="10" font-weight="400" fill="#111111">Certificate Code</text>
      <text x="0" y="15" class="sans-text" font-size="10" font-weight="400" fill="#111111">623C-2D9C-0BD5-4A29</text>
    </g>

    <!-- Signature and CEO metadata right side -->
    <g transform="translate(360, 0)">
      <!-- Handwritten signature overlay -->
      <text x="140" y="24" class="signature-text" font-size="44" fill="#111111" text-anchor="middle">Grant Petty</text>
      <!-- Base Line -->
      <line x1="0" y1="36" x2="280" y2="36" stroke="#111111" stroke-width="0.75" />
      <!-- Subtext -->
      <text x="140" y="52" class="sans-text" font-size="11" font-weight="400" fill="#111111" text-anchor="middle">CEO Blackmagic Design</text>
    </g>
  </g>
</svg>
